<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>PONG</h1>
            <div class="scoreboard">
                <span id="score1">0</span>
                <span class="divider">:</span>
                <span id="score2">0</span>
            </div>
        </header>

        <canvas id="pongCanvas" width="800" height="500"></canvas>

        <div id="controls-panel">
            <div class="control-group">
                <label for="modeSelect">Game Mode:</label>
                <select id="modeSelect">
                    <option value="1">1 Player (vs AI)</option>
                    <option value="2">2 Players</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="paddleSpeed">Paddle Speed: <span id="speedValue">7</span></label>
                <input type="range" id="paddleSpeed" min="4" max="15" value="7">
            </div>

            <div class="control-group">
                <label for="maxScore">Play to:</label>
                <select id="maxScore">
                    <option value="5">Best of 5 (First to 3)</option>
                    <option value="10" selected>First to 10</option>
                    <option value="Infinity">Unlimited</option>
                </select>
            </div>
            
            <button id="startBtn">Start Game</button>
        </div>

        <div id="instructions">
            <p><strong>Player 1:</strong> W / S | <strong>Player 2:</strong> Up / Down</p>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <h2 id="winnerText">Player 1 Wins!</h2>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
