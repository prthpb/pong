<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="crt">
    <div id="game-container">
        <header>
            <h1>PONG</h1>
            <div class="scoreboard">
                <span id="score1" class="score">0</span>
                <span class="divider"></span>
                <span id="score2" class="score">0</span>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="pongCanvas" width="800" height="500"></canvas>
        </div>

        <div id="controls-panel">
            <div class="control-group">
                <label for="modeSelect">Game Mode</label>
                <select id="modeSelect">
                    <option value="1">1 Player (vs AI)</option>
                    <option value="2">2 Players</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="paddleSpeed">Paddle Speed: <span id="speedValue">8</span></label>
                <input type="range" id="paddleSpeed" min="5" max="15" value="8">
            </div>

            <div class="control-group">
                <label for="maxScore">Play to</label>
                <select id="maxScore">
                    <option value="5">First to 5</option>
                    <option value="10" selected>First to 10</option>
                    <option value="Infinity">Endless</option>
                </select>
            </div>
            
            <button id="startBtn">INITIALIZE</button>
        </div>

        <div id="instructions">
            <p>P1: [W] [S] | P2: [UP] [DOWN]</p>
            <p class="hint">Hint: Move the paddle while hitting the ball to add spin!</p>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <h2 id="winnerText">SYSTEM HALTED</h2>
            <button id="restartBtn">REBOOT SYSTEM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
